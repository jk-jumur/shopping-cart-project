<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <!-- Tailwind CSS And Daisy UI -->

      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

      <!--Font Awesome CDN-->

      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body class="bg-[#F9FAFB] h-svh flex  justify-center  items-center">
      <div class="bg-white p-8 rounded-2xl shadow-lg flex flex-col items-center space-y-3 w-md">
            <!--Icons-->
            <div class="bg-[#4F46E5] text-white w-fit rounded-2xl p-4">
               <i class="fa-solid fa-arrow-right-to-bracket"></i>
           </div>
             <h2 class="text-[#111827] text-2xl font-semibold ">Welcome to JK Shop</h2>
             <p class="text-[#4A5565]">Sign in to continue shopping</p>

             <!-- Email Input Field -->
             <form class="w-full flex items-center flex-col mt-4 gap-3">
                 <div class="w-full">
                <p class="text-[16px] text-[#111827] font-medium mb-1">Email Address</p>
                <label class="input validator w-full bg-[#E8F0FE] rounded-xl">

              <input type="email" id="email" class="w-full bg-[#E8F0FE]" placeholder="agency@agency.com" required />
             </label>
              <div class="validator-hint hidden">Enter valid email address</div>
                </div>

                 <!-- Password Input Field-->
                   <div class="w-full">
                  <p class="text-[16px] font-medium text-[#111827] mb-1">Password</p>
                 <label class="input validator w-full bg-[#E8F0FE] rounded-xl">
              
                <input id="password"
                type="password"
                required
                 placeholder="password"
                title="Must be more than 8 characters, including number, lowercase letter, uppercase letter"
              />
                </label>
              <p class="validator-hint hidden">
              Must be more than 8 characters, including
               <br />At least one number <br />At least one lowercase letter <br />At least one uppercase letter
                 </p>
                   </div>

                   <div class="flex items-center justify-between w-full">
                       <div class="flex items-center gap-2">
                          <input type="checkbox" class="checkbox" />
                          <p>Remember Me</p>
                       </div>
                       <a href="#" class="text-[#4F46E5]">Forgot password?</a>
                   </div>

                   <button id="signinBtn" type="submit" class=" w-full bg-[#4F46E5] text-white py-2 rounded-xl">Sign In</button>

                   <p class="text-[#4A5565]">Don't have an account? <a href="#" class="text-[#4F46E5]">Contact Us</a></p>
             </form>
        </div>

        <!-- JS -->
         <script src="./script/index.js"></script>
</body>
</html>
