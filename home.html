<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

     <!-- Tailwind CSS And Daisy UI -->

      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

      <!--Font Awesome CDN-->

      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#F9FAFB] h-svh">

      <header class="bg-[#FFFFFF] p-3">
            <nav class="flex items-center justify-between container mx-auto">
               <h2 class="text-2xl font-medium text-[#111827]">JK Shop</h2>
                <div class="relative">
                    <input type="text" placeholder="Search Products..." class="input pl-8 bg-gray-100" />

                   <i class="fa-solid fa-magnifying-glass absolute top-1/2 -translate-y-1/2 left-2 text-gray-500"></i>
                </div>
          </nav>
      </header>

      <main class="container mx-auto my-12">
          <section>
               <h2 class="text-2xl font-[500] text-[#111827]">Discover Our Products</h2>
               <p class="text-[#4A5565] mb-2 mt-6">Explore our curated collection of premium products</p>

               <div class="flex  items-center justify-between">
                  <select class="select w-35">
                  <option selected>All</option>
                  <option>Men</option>
                  <option>Women</option>
                  <option>Baby</option>
                </select> 

                <p class="bg-[#4F46E5] text-white py-2 px-6 rounded-xl">Total: 6</p>
               </div>

                <!-- Products Container -->
                    <div>
                         <!-- Products Card -->
                    </div>
          </section>
      </main>

    
</body>
</html>
